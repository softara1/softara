name: Release Automation

on:
  workflow_dispatch:

  release:
    types:
      - published

permissions:
  contents: write


jobs:

  release-info:

    runs-on: ubuntu-latest


    steps:


      - name: Checkout repository
        uses: actions/checkout@v5



      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"



      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install requests



      - name: Download Release APK Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |

          mkdir -p apk_files

          gh release download "${{ github.event.release.tag_name }}" \
          --repo "${{ github.repository }}" \
          --pattern "*.apk" \
          --dir apk_files



      - name: Show downloaded APK files
        run: |

          echo "APK files downloaded:"

          ls -lh apk_files



      - name: Run Release Builder
        run: |
          python scripts/upload_to_vt.py



      - name: Generate Release Notes
        run: |
          python scripts/generate_release_notes.py



      - name: Create ZIP package
        run: |

          VERSION=${GITHUB_REF_NAME:-latest}

          echo "Creating release: Softara-$VERSION.zip"

          zip -r Softara-$VERSION.zip . \
          -x ".git/*" \
          -x ".github/*" \
          -x "scripts/*"



      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: Softara-release
          path: Softara-*.zip



      - name: Update GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:

          files: |
            Softara-*.zip

          body_path: release_notes.md
