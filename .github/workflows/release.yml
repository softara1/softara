name: Auto Release with VirusTotal

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  process-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Download release assets
        run: |
          mkdir -p assets
          cd assets
          # استخراج روابط التحميل لكل أصل من واجهة GitHub API
          ASSETS_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/${{ github.event.release.id }}" \
            | jq -r '.assets[] | .browser_download_url')
          for url in $ASSETS_URL; do
            echo "Downloading $url"
            wget -q "$url"
          done
          cd ..
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan APKs with VirusTotal & build report
        run: |
          python scripts/vt_scan.py assets/
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}

      - name: Generate final release body
        run: |
          python scripts/generate_release_body.py \
            --release-id ${{ github.event.release.id }} \
            --tag ${{ github.ref_name }} \
            --output final_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release description
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: final_body.md
          # لا نرفع ملفات إضافية لأننا نريد فقط تحديث الوصف
          # (الأصول موجودة أصلاً)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
