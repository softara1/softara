<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>مركز رفع سوفتارا</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e1e2f, #2a2a40);
      font-family: sans-serif;
      color: white;
    }

    .box {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      width: 350px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 26px;
    }

    .footer {
      margin-top: 25px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>مركز رفع سوفتارا</h1>
    <p>صفحة بسيطة ومختصرة</p>

    <div class="footer">
      جميع الحقوق محفوظة © عوض السوداني
    </div>
  </div>

</body>
</html>
